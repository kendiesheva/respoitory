<style>
body {
  margin: 0;
  font-family: "Poppins", Arial, sans-serif;
  background: #f4f6f9;
}

/* TITRE */
.section-title {
  text-align: center;
  font-size: 36px;
  font-weight: 700;
  padding: 50px 20px 20px;
}

/* SECTION */
.stats-section {
  padding: 3rem 1.5rem;
  background: linear-gradient(180deg, #eef3f0, #ffffff);
}

/* GRID */
.stats-grid {
  max-width: 1400px;
  margin: auto;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1.5rem;
}

/* CARD */
.stat-card {
  background: #fff;
  border-radius: 16px;
  padding: 2rem 1.5rem;
  text-align: center;
  box-shadow: 0 6px 18px rgba(0,0,0,0.06);
  transition: transform 0.3s ease;
  will-change: transform;
}

.stat-card:hover {
  transform: translateY(-6px);
}

/* TITRE */
.stat-title {
  font-size: 1rem;
  color: #333;
  margin-bottom: 1rem;
}

/* LIGNE */
.stat-divider {
  width: 40px;
  height: 3px;
  background: #2e8b57;
  margin: 0 auto 1rem;
  border-radius: 2px;
}

/* NUMBER */
.stat-number {
  font-size: 3rem;
  font-weight: 800;
  color: #2e8b57;
  margin-bottom: 0.5rem;
}

/* TEXT */
.stat-text {
  font-size: 0.9rem;
  color: #555;
  margin-bottom: 1.2rem;
}

/* BUTTON */
.stat-btn {
  display: inline-block;
  padding: 0.6rem 1.4rem;
  background: #2e8b57;
  color: #fff;
  border-radius: 20px;
  font-size: 0.85rem;
  text-decoration: none;
  transition: background 0.2s ease;
}

.stat-btn:hover {
  background: #246b45;
}

/* RESPONSIVE */
@media(max-width: 1200px){
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
}

@media(max-width: 600px){
  .stats-grid { grid-template-columns: 1fr; }
}
</style>

<h2 class="section-title">
Indicateurs clés d’aménagement du territoire
</h2>

<section class="stats-section">
  <div class="stats-grid">

    <!-- CARD -->
    <div class="stat-card">
      <div class="stat-title">Affectation nationale</div>
      <div class="stat-divider"></div>
      <div class="stat-number" data-target="65" data-suffix="%">0</div>
      <div class="stat-text">du territoire affecté aux concessions</div>
      <a href="#" class="stat-btn">Voir</a>
    </div>

    <div class="stat-card">
      <div class="stat-title">Schémas d’aménagement</div>
      <div class="stat-divider"></div>
      <div class="stat-number" data-target="3">0</div>
      <div class="stat-text">départements accompagnés</div>
      <a href="#" class="stat-btn">Voir</a>
    </div>

    <div class="stat-card">
      <div class="stat-title">Bornes géodésiques</div>
      <div class="stat-divider"></div>
      <div class="stat-number" data-target="95">0</div>
      <div class="stat-text">installées sur le territoire</div>
      <a href="#" class="stat-btn">Voir</a>
    </div>

    <div class="stat-card">
      <div class="stat-title">Acteurs mobilisés</div>
      <div class="stat-divider"></div>
      <div class="stat-number" data-target="3000">0</div>
      <div class="stat-text">acteurs territoriaux</div>
      <a href="#" class="stat-btn">Voir</a>
    </div>

  </div>
</section>

<script>
const counters = document.querySelectorAll('.stat-number');

function animateCounter(counter) {
  const target = +counter.dataset.target;
  const suffix = counter.dataset.suffix || "";
  let current = 0;

  const step = Math.max(1, target / 80); // 🔥 moins de calculs

  function update() {
    current += step;
    if (current < target) {
      counter.textContent = Math.floor(current).toLocaleString() + suffix;
      requestAnimationFrame(update);
    } else {
      counter.textContent = target.toLocaleString() + suffix;
    }
  }

  update();
}

/* INTERSECTION OPTIMISÉ */
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.querySelectorAll('.stat-number')
        .forEach(el => animateCounter(el));
      observer.disconnect();
    }
  });
});

observer.observe(document.querySelector('.stats-section'));
</script>
